<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhotoMAP</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #000000; --danger: #ff4757; --shadow: 0 10px 30px rgba(0,0,0,0.1); --radius: 24px; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: white; font-family: 'Pretendard', sans-serif; }
        
        #map { width: 100%; height: 100%; background: white; position: absolute; top: 0; left: 0; z-index: 1; }
        .leaflet-tile-container { filter: grayscale(1) brightness(1.05); }

        /* --- 로그인 화면 --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 85%; max-width: 320px; text-align: center; padding: 40px 20px; border-radius: 30px; box-shadow: var(--shadow); }
        .login-box h2 { font-weight: 800; margin-bottom: 30px; font-size: 24px; }
        .google-login-btn { width: 100%; padding: 14px; background: white; border: 1px solid #ddd; border-radius: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 15px; }

        /* --- 팝업 UI (모바일 터치 보정) --- */
        .leaflet-popup-close-button { display: none !important; }
        .leaflet-popup-content-wrapper { border-radius: 16px; box-shadow: var(--shadow); padding: 0; overflow: hidden; pointer-events: auto !important; }
        .leaflet-popup-content { margin: 0; width: 220px !important; pointer-events: auto !important; }
        .popup-container { padding: 20px 15px 15px 15px; position: relative; pointer-events: auto !important; }
        
        .popup-city { font-weight: 800; font-size: 16px; margin-bottom: 5px; display: block; padding-right: 25px; }
        .popup-memo { font-size: 13px; color: #555; line-height: 1.4; margin: 8px 0; white-space: pre-wrap; }
        .popup-img { width: 100%; border-radius: 10px; margin-top: 5px; display: block; border: 1px solid #f0f0f0; }
        
        .popup-links { margin-top: 12px; border-top: 1px solid #f0f0f0; padding-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .link-item { display: flex; align-items: center; gap: 8px; font-size: 12px; text-decoration: none; color: #555; }
        .link-icon { width: 14px; height: 14px; stroke: #000; fill: none; stroke-width: 2.2; }

        /* 수정 연필 버튼 (터치 영역 강화) */
        .edit-pencil { 
            position: absolute; top: 15px; right: 15px; 
            cursor: pointer; width: 32px; height: 32px; 
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            pointer-events: auto !important; /* 모달 터치 관통 방지 */
            -webkit-tap-highlight-color: transparent;
        }
        .edit-pencil svg { width: 20px; height: 20px; fill: none; stroke: #000; stroke-width: 2.2; }

        /* --- 상단 검색바 --- */
        .top-search-bar { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; align-items: center; background: white; height: 50px; width: 50px; border-radius: 25px; box-shadow: var(--shadow); overflow: hidden; transition: 0.4s; border: 1px solid #eee; }
        .top-search-bar:hover, .top-search-bar:focus-within { width: calc(100% - 100px); max-width: 300px; }
        .search-icon-box { min-width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .search-icon-box svg { width: 20px; height: 20px; stroke: #000; stroke-width: 2.5; fill: none; }
        .top-search-bar input { width: 100%; border: none; outline: none; font-size: 15px; opacity: 0; padding-right: 15px; }
        .top-search-bar:hover input, .top-search-bar:focus-within input { opacity: 1; }

        /* --- 하단 버튼 --- */
        .controls-zoom { position: fixed; bottom: 25px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .btn-circle { width: 38px; height: 38px; background: white; border-radius: 50%; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; font-size: 18px; }
        .btn-add { position: fixed; bottom: 25px; right: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        /* --- 필터링 --- */
        .filter-wrapper { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .filter-main-btn { width: 50px; height: 50px; background: white; border-radius: 50%; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; border: 1px solid #eee; cursor: pointer; position: relative; z-index: 1001; }
        .filter-main-btn svg { width: 20px; height: 20px; stroke: #000; stroke-width: 2.2; fill: none; }
        .filter-menu { display: flex; flex-direction: column; gap: 10px; padding: 12px 0; background: white; border-radius: 25px; box-shadow: var(--shadow); border: 1px solid #eee; opacity: 0; transform: translateY(-10px); transition: 0.3s; margin-top: 5px; pointer-events: none; }
        .filter-menu.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .filter-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; margin: 0 16px; flex-shrink: 0; }
        .filter-dot.off { opacity: 0.2; transform: scale(0.8); }
        .logout-btn { width: 44px; height: 44px; background: white; border-radius: 50%; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #eee; margin-top: 15px; }
        .logout-btn svg { width: 18px; height: 18px; stroke: #ff4757; stroke-width: 2.5; fill: none; }

        /* --- 모달 --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); backdrop-filter: blur(8px); z-index: 11000; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 350px; background: white; padding: 25px; border-radius: var(--radius); box-shadow: var(--shadow); z-index: 11001; max-height: 85vh; overflow-y: auto; }
        .modal.active, .modal-overlay.active { display: block; }
        .modal-tabs { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; }
        .tab { padding: 10px 0; color: #bbb; font-weight: 800; cursor: pointer; font-size: 14px; position: relative; }
        .tab.active { color: var(--primary); }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--primary); }
        .input-field { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 14px; box-sizing: border-box; font-size: 14px; outline: none; margin-bottom: 12px; }
        .autocomplete-container { position: absolute; top: 120px; left: 25px; width: calc(100% - 50px); background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 12000; max-height: 150px; overflow-y: auto; display: none; border: 1px solid #f0f0f0; }
        .autocomplete-item { padding: 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f9f9f9; }
        .file-upload-section { background: #fdfdfd; border: 1.5px dashed #ccc; border-radius: 14px; padding: 15px; text-align: center; cursor: pointer; margin-bottom: 12px; font-size: 12px; color: #888; }
        #preview-img { width: 100%; max-height: 100px; object-fit: cover; border-radius: 10px; display: none; margin-top: 5px; }
        .color-row { display: flex; justify-content: space-between; flex-wrap: nowrap; gap: 4px; margin-bottom: 20px; }
        .color-circle { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; flex-shrink: 0; }
        .color-circle.active { border-color: var(--primary); transform: scale(1.1); }
        .btn-save { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-delete { width: 100%; padding: 10px; background: transparent; color: var(--danger); border: none; font-size: 13px; font-weight: bold; cursor: pointer; text-decoration: underline; margin-top: 8px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>Memory Map</h2>
        <button class="google-login-btn" onclick="handleGoogleLogin()">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Google 계정으로 로그인
        </button>
    </div>
</div>

<div id="map"></div>

<div class="top-search-bar">
    <div class="search-icon-box"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></div>
    <input type="text" id="topInput" placeholder="도시 검색..." onkeypress="if(event.keyCode==13) globalSearch()">
</div>

<div class="filter-wrapper">
    <div class="filter-main-btn" onclick="toggleFilterMenu()"><svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg></div>
    <div class="filter-menu" id="filterMenu"></div>
    <div class="logout-btn" onclick="handleLogout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></div>
</div>

<div class="controls-zoom"><button class="btn-circle" onclick="map.zoomIn()">+</button><button class="btn-circle" onclick="map.zoomOut()">−</button></div>
<div class="btn-add" onclick="openModal(false)">+</div>
<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <div class="modal-header" id="modalTitle">📍 핀 추가</div>
    <div class="modal-tabs" id="modalTabs"><div class="tab active" id="tab0Btn" onclick="setTab(0)">정보</div><div class="tab" id="tab1Btn" onclick="setTab(1)">링크</div></div>
    <div id="tab0">
        <input type="text" id="cityInput" class="input-field" placeholder="도시명 검색" autocomplete="off"><div id="autocomplete" class="autocomplete-container"></div>
        <div class="file-upload-section" onclick="document.getElementById('fileInput').click()">🖼️ 사진 선택<img id="preview-img"></div>
        <input type="file" id="fileInput" hidden accept="image/*">
        <textarea id="memo" class="input-field" style="height: 80px; resize: none;" placeholder="메모를 입력하세요..."></textarea>
    </div>
    <div id="tab1" style="display:none;">
        <input type="text" id="linkIG" class="input-field" placeholder="Instagram URL"><input type="text" id="linkYT" class="input-field" placeholder="YouTube URL"><input type="text" id="linkGMap" class="input-field" placeholder="Google Maps URL"><input type="text" id="linkWEB" class="input-field" placeholder="Website URL">
    </div>
    <div class="color-row" id="palette"></div>
    <button class="btn-save" id="saveBtn" onclick="savePin()">SAVE JOURNEY</button>
    <button class="btn-delete" id="deleteBtn" style="display:none;" onclick="deletePin()">핀 삭제</button>
</div>

<script>
    // --- 1. Firebase 설정 (본인 정보 입력 필수) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBRc5qN-elJyx9E24u3sCgBBjPHuYJGScI",
        authDomain: "mapforme-6a960.firebaseapp.com",
        projectId: "mapforme-6a960",
        storageBucket: "mapforme-6a960.firebasestorage.app",
        messagingSenderId: "1017226924243",
        appId: "1:1017226924243:web:7fee9bd1df5d8efb93c426",
        measurementId: "G-F3WNXS12E5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth(), provider = new firebase.auth.GoogleAuthProvider();

    // --- 2. 로그인 및 데이터 연결 ---
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    auth.onAuthStateChanged(user => {
        if (user) { document.getElementById('login-overlay').style.display = 'none'; loadPins(); }
        else { document.getElementById('login-overlay').style.display = 'flex'; }
    });
    function handleGoogleLogin() { auth.signInWithPopup(provider).catch(() => auth.signInWithRedirect(provider)); }
    function handleLogout() { if(confirm("로그아웃?")) auth.signOut().then(() => location.reload()); }

    // --- 3. 지도 설정 (태평양 중심) ---
    const map = L.map('map', { zoomControl: false, worldCopyJump: true, maxBounds: [[-75, -Infinity], [85, Infinity]], minZoom: 2 }).setView([25, 160], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    const colors = ['#ff5252', '#ffab40', '#ffd740', '#69f0ae', '#40c4ff', '#7c4dff', '#ff9ff3', '#576574', '#222f3e', '#000000'];
    let activeFilters = new Set(colors), currentCoords = null, currentColor = colors[0], uploadedImageData = null, editingMarker = null, markers = [];

    const filterMenu = document.getElementById('filterMenu'), palette = document.getElementById('palette');
    function toggleFilterMenu() { filterMenu.classList.toggle('active'); }

    colors.forEach(c => {
        const fDot = document.createElement('div'); fDot.className = 'filter-dot'; fDot.style.background = c;
        fDot.onclick = () => { if(activeFilters.has(c)) activeFilters.delete(c); else activeFilters.add(c); fDot.classList.toggle('off'); applyFilter(); };
        filterMenu.appendChild(fDot);
        const pDot = document.createElement('div'); pDot.className = 'color-circle' + (c === currentColor ? ' active' : '');
        pDot.style.background = c; pDot.setAttribute('data-color', c); pDot.onclick = () => selectColor(c, pDot); palette.appendChild(pDot);
    });

    map.on('click', () => { markers.forEach(m => { m.isSticky = false; m.closePopup(); }); filterMenu.classList.remove('active'); });

    // --- 4. 핀 관리 로직 (무한 수정 가능하도록 초기화 강화) ---
    function loadPins() {
        db.ref('pins').off();
        db.ref('pins').on('value', snapshot => {
            markers.forEach(m => map.removeLayer(m)); markers = [];
            const data = snapshot.val(); if(!data) return;
            for (let key in data) {
                const p = data[key];
                const marker = L.circleMarker(p.coords, { radius: 9, fillColor: p.color, color: "#fff", weight: 2.5, fillOpacity: 1 }).addTo(map);
                marker.dbKey = key; marker.city = p.city; marker.memo = p.memo; marker.img = p.img; marker.coords = p.coords; marker.color = p.color; marker.links = p.links || {}; marker.isSticky = false;
                updatePopup(marker);
                marker.on('mouseover', function() { if(!this.isSticky) this.openPopup(); });
                marker.on('mouseout', function() { if(!this.isSticky) this.closePopup(); });
                marker.on('click', function(e) { L.DomEvent.stopPropagation(e); markers.forEach(m => m.isSticky = false); this.isSticky = true; this.openPopup(); });
                markers.push(marker);
            }
            applyFilter();
        });
    }

    // 사진 압축 (모바일 메모리 보전)
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const max_size = 1200; let width = img.width, height = img.height;
                if(width > height) { if(width > max_size) { height *= max_size / width; width = max_size; } }
                else { if(height > max_size) { width *= max_size / height; height = max_size; } }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                uploadedImageData = canvas.toDataURL('image/jpeg', 0.8);
                document.getElementById('preview-img').src = uploadedImageData; document.getElementById('preview-img').style.display = "block";
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    function savePin() {
        const city = document.getElementById('cityInput').value, memo = document.getElementById('memo').value;
        const links = { ig: document.getElementById('linkIG').value||"", yt: document.getElementById('linkYT').value||"", gmap: document.getElementById('linkGMap').value||"", web: document.getElementById('linkWEB').value||"" };
        if(!currentCoords && !editingMarker) return alert("도시 선택!");
        const pinData = { city, memo, img: uploadedImageData||"", color: currentColor, links, coords: currentCoords || editingMarker.coords };
        if(editingMarker) db.ref('pins/' + editingMarker.dbKey).set(pinData); else db.ref('pins').push(pinData);
        closeModal();
    }

    function deletePin() { if(editingMarker && confirm("삭제?")) { db.ref('pins/'+editingMarker.dbKey).remove(); closeModal(); } }

    // 전역 수정 호출 (모바일 터치 씹힘 방지)
    window.triggerEdit = (id) => {
        const marker = markers.find(m => m.dbKey === id);
        if(marker) { editingMarker = marker; prepareEdit(marker); openModal(true); }
    };

    function updatePopup(marker) {
        const links = marker.links || {}; let linkHtml = '';
        if(links.ig || links.yt || links.gmap || links.web) {
            linkHtml = '<div class="popup-links">';
            if(links.ig) linkHtml += `<a href="${links.ig}" class="link-item" target="_blank"><svg class="link-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>Instagram</a>`;
            if(links.yt) linkHtml += `<a href="${links.yt}" class="link-item" target="_blank"><svg class="link-icon" viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg>YouTube</a>`;
            if(links.gmap) linkHtml += `<a href="${links.gmap}" class="link-item" target="_blank"><svg class="link-icon" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>Google Maps</a>`;
            if(links.web) linkHtml += `<a href="${links.web}" class="link-item" target="_blank"><svg class="link-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>Website</a>`;
            linkHtml += '</div>';
        }
        // 연필 아이콘 HTML (onclick에 전역 함수 연결)
        const html = `<div class="popup-container">
            <div class="edit-pencil" onclick="window.triggerEdit('${marker.dbKey}')">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </div>
            <span class="popup-city">${marker.city}</span><p class="popup-memo">${marker.memo||''}</p>
            ${marker.img?`<img src="${marker.img}" class="popup-img">`:''}${linkHtml}</div>`;
        marker.bindPopup(html, {maxWidth:220});
    }

    // --- 5. 유틸리티 ---
    const cityInput = document.getElementById('cityInput'), autoList = document.getElementById('autocomplete');
    cityInput.addEventListener('input', debounce(async (e) => {
        const q = e.target.value; if(q.length < 2) { autoList.style.display='none'; return; }
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=5`);
        const data = await res.json(); autoList.innerHTML = '';
        if(data.length > 0) { autoList.style.display='block'; data.forEach(item => {
            const div = document.createElement('div'); div.className = 'autocomplete-item'; div.innerText = item.display_name;
            div.onclick = () => { cityInput.value = item.display_name.split(',')[0]; currentCoords = [item.lat, item.lon]; autoList.style.display='none'; }; autoList.appendChild(div);
        });}
    }, 300));
    function debounce(f, t) { let timer; return (...args) => { clearTimeout(timer); timer = setTimeout(() => f.apply(this, args), t); }; }
    function applyFilter() { markers.forEach(m => { if(activeFilters.has(m.color)) { if(!map.hasLayer(m)) m.addTo(map); } else { if(map.hasLayer(m)) map.removeLayer(m); } }); }
    function resetFilter() { activeFilters = new Set(colors); document.querySelectorAll('.filter-dot').forEach(d => d.classList.remove('off')); applyFilter(); }
    function openModal(isEdit) { document.getElementById('overlay').classList.add('active'); document.getElementById('modal').classList.add('active'); if(!isEdit) { editingMarker = null; resetForm(); document.getElementById('modalTitle').innerText = "📍 핀 추가"; document.getElementById('deleteBtn').style.display = "none"; } else { document.getElementById('modalTitle').innerText = "✏️ 핀 수정"; document.getElementById('deleteBtn').style.display = "block"; } }
    function closeModal() { document.getElementById('overlay').classList.remove('active'); document.getElementById('modal').classList.remove('active'); }
    function resetForm() { document.getElementById('cityInput').value = ""; document.getElementById('memo').value = ""; document.getElementById('preview-img').style.display = 'none'; document.getElementById('fileInput').value = ""; uploadedImageData = null; currentCoords = null; document.getElementById('linkIG').value = ""; document.getElementById('linkYT').value = ""; document.getElementById('linkGMap').value = ""; document.getElementById('linkWEB').value = ""; }
    function setTab(idx) { document.getElementById('tab0').style.display = idx === 0 ? 'block' : 'none'; document.getElementById('tab1').style.display = idx === 1 ? 'block' : 'none'; document.getElementById('tab0Btn').classList.toggle('active', idx === 0); document.getElementById('tab1Btn').classList.toggle('active', idx === 1); }
    function selectColor(c, el) { currentColor = c; document.querySelectorAll('.color-circle').forEach(x => x.classList.remove('active')); el.classList.add('active'); }
    function prepareEdit(m) { document.getElementById('cityInput').value = m.city; document.getElementById('memo').value = m.memo; if(m.img) { document.getElementById('preview-img').src = m.img; document.getElementById('preview-img').style.display = "block"; uploadedImageData = m.img; } else { document.getElementById('preview-img').style.display = "none"; uploadedImageData = null; } currentCoords = m.coords; currentColor = m.color; document.getElementById('linkIG').value = (m.links && m.links.ig) || ""; document.getElementById('linkYT').value = (m.links && m.links.yt) || ""; document.getElementById('linkGMap').value = (m.links && m.links.gmap) || ""; document.getElementById('linkWEB').value = (m.links && m.links.web) || ""; document.querySelectorAll('.color-circle').forEach(x => x.classList.toggle('active', x.getAttribute('data-color') === currentColor)); }
    function globalSearch() { const val = document.getElementById('topInput').value; if(!val) return; fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}&limit=1`).then(r => r.json()).then(d => { if(d.length > 0) map.setView([d[0].lat, d[0].lon], 7); }); }
</script>
</body>
